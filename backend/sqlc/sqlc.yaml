version: "2"
sql:
  - engine: "postgresql"
    queries: "../sql/queries"
    schema: "../migrations"
    gen:
      go:
        package: "queries"
        out: "../internal/db/queries"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.text[]"
            go_type: "[]string"
